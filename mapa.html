<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viksdal</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<!-- FIREBASE: substitua os valores abaixo pelos seus (passo 3 do guia) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBCYLeM-kzt-ranLjPpJKerO1K-nF0U7_0",
  authDomain: "viksdal-rpg.firebaseapp.com",
  databaseURL: "https://viksdal-rpg-default-rtdb.firebaseio.com",
  projectId: "viksdal-rpg",
  storageBucket: "viksdal-rpg.firebasestorage.app",
  messagingSenderId: "259939315702",
  appId: "1:259939315702:web:b599846c0fb7ac48c6e1d7"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Escuta mudanças em tempo real
  onValue(ref(db, 'locations'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    Object.entries(data).forEach(([id, state]) => {
      const pin = document.querySelector(`.location[data-id="${id}"]`);
      if (!pin) return;
      if (state.unlocked) {
        pin.classList.remove('locked');
        pin.dataset.status = state.visited ? 'visitado' : 'inexplorado';
        if (state.visited) pin.classList.add('visited');
        else pin.classList.remove('visited');
      } else {
        pin.classList.add('locked');
      }
    });
  });
</script>

<style>
  :root {
    --ink: #1a1410;
    --parchment: #c8b89a;
    --parchment-dark: #a89070;
    --parchment-light: #ddd0b8;
    --accent: #6b3a2a;
    --accent-glow: rgba(107, 58, 42, 0.4);
    --text: #2a1f14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0b08;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Crimson Pro', serif;
    overflow: hidden;
  }

  .outer-frame {
    position: relative;
    width: min(92vw, 780px);
    aspect-ratio: 3/4;
  }

  .map-container {
    position: relative;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 30% 20%, #d4c4a0 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, #c0a87a 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, #cdb990 0%, transparent 100%),
      #b8a278;
    border: 2px solid #7a6040;
    overflow: hidden;
  }

  .map-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
  }

  .map-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 0% 0%, rgba(60,30,10,0.35) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 0%, rgba(60,30,10,0.3) 0%, transparent 35%),
      radial-gradient(ellipse at 0% 100%, rgba(60,30,10,0.4) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 100%, rgba(60,30,10,0.35) 0%, transparent 40%);
    pointer-events: none;
    z-index: 10;
  }

  .map-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  .fog-layer {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  .fog-patch {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(190,175,150,0.22) 0%, transparent 70%);
    animation: fogDrift linear infinite;
  }

  @keyframes fogDrift {
    0%   { transform: translate(0,0) scale(1); opacity: 0.6; }
    33%  { transform: translate(15px,-10px) scale(1.05); opacity: 0.9; }
    66%  { transform: translate(-10px,8px) scale(0.97); opacity: 0.5; }
    100% { transform: translate(0,0) scale(1); opacity: 0.6; }
  }

  /* PINS */
  .location {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 8;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  /* Locais bloqueados ficam invisíveis */
  .location.locked {
    opacity: 0;
    pointer-events: none;
  }

  /* Animação de desbloqueio */
  .location:not(.locked) {
    animation: pinReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes pinReveal {
    from { opacity: 0; transform: translate(-50%, -60%) scale(0.5); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  .pin-dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border: 1.5px solid #3a1a0a;
    border-radius: 50%;
    position: relative;
    transition: all 0.3s ease;
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .pin-dot::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(107,58,42,0.3);
    animation: pinPulse 2.5s ease-in-out infinite;
  }

  .pin-dot::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(107,58,42,0.15);
    animation: pinPulse 2.5s ease-in-out infinite 0.4s;
  }

  @keyframes pinPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.3); opacity: 0; }
  }

  .location:hover .pin-dot {
    background: #8b4a32;
    box-shadow: 0 0 14px rgba(107,58,42,0.7);
    transform: scale(1.3);
  }

  .pin-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 18px;
    white-space: nowrap;
    font-family: 'IM Fell English', serif;
    font-size: clamp(9px, 1.4vw, 12px);
    color: var(--text);
    letter-spacing: 0.03em;
    text-shadow: 0 1px 3px rgba(200,180,150,0.8);
    pointer-events: none;
    opacity: 0.85;
  }

  /* Posição atual */
  .current-location .pin-dot {
    background: #3a6b4a;
    box-shadow: 0 0 8px rgba(58,107,74,0.5);
  }
  .current-location .pin-dot::before { border-color: rgba(58,107,74,0.4); }
  .current-location .pin-dot::after  { border-color: rgba(58,107,74,0.2); }

  /* Visitado */
  .location.visited .pin-dot {
    background: #4a3520;
    box-shadow: 0 0 4px rgba(74,53,32,0.3);
  }
  .location.visited .pin-label { opacity: 0.5; }

  /* Painel info */
  .location-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(20,14,8,0.97) 0%, rgba(20,14,8,0.85) 80%, transparent 100%);
    padding: clamp(16px,3vw,28px) clamp(20px,4vw,36px) clamp(20px,3vw,28px);
    z-index: 12;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .location-panel.visible { transform: translateY(0); }

  .panel-name {
    font-family: 'IM Fell English', serif;
    font-size: clamp(14px, 2.5vw, 20px);
    color: var(--parchment-light);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .panel-status {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(11px, 1.8vw, 14px);
    color: var(--parchment-dark);
  }

  .panel-close {
    position: absolute;
    top: 12px; right: 18px;
    background: none;
    border: none;
    color: var(--parchment-dark);
    font-family: 'IM Fell English', serif;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .panel-close:hover { opacity: 1; }

  /* Título */
  .map-title {
    position: absolute;
    top: clamp(12px, 2.5vw, 22px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 9;
    text-align: center;
    pointer-events: none;
  }

  .map-title h1 {
    font-family: 'IM Fell English', serif;
    font-size: clamp(20px, 4vw, 34px);
    color: var(--text);
    letter-spacing: 0.15em;
    text-shadow: 0 1px 0 rgba(200,180,150,0.6);
    opacity: 0.85;
  }

  .map-title p {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(9px, 1.5vw, 12px);
    color: var(--accent);
    letter-spacing: 0.2em;
    opacity: 0.7;
    margin-top: 2px;
  }

  .compass {
    position: absolute;
    bottom: clamp(16px,3vw,28px);
    right: clamp(16px,3vw,28px);
    z-index: 9;
    width: clamp(40px,6vw,56px);
    height: clamp(40px,6vw,56px);
    opacity: 0.55;
    pointer-events: none;
  }

  .border-deco {
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(90,60,30,0.3);
    pointer-events: none;
    z-index: 9;
  }
  .border-deco::before { content:'✦'; position:absolute; top:-8px; left:-8px; font-size:14px; color:rgba(90,60,30,0.5); }
  .border-deco::after  { content:'✦'; position:absolute; bottom:-8px; right:-8px; font-size:14px; color:rgba(90,60,30,0.5); }

  /* Indicador de conexão */
  .connection-dot {
    position: absolute;
    top: 14px;
    right: 18px;
    z-index: 15;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #888;
    transition: background 0.5s;
  }
  .connection-dot.online  { background: #4a8a5a; box-shadow: 0 0 6px rgba(74,138,90,0.6); }
  .connection-dot.offline { background: #8a4a3a; }
</style>
</head>
<body>

<div class="outer-frame">
<div class="map-container">

  <div class="border-deco"></div>
  <div class="connection-dot" id="connDot" title="conexão"></div>

  <div class="map-title">
    <h1>VIKSDAL</h1>
    <p>Finlândia · noite</p>
  </div>

  <svg class="map-svg" viewBox="0 0 400 533" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="roughen">
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <g opacity="0.18" fill="#2a3a20">
      <ellipse cx="60" cy="80" rx="28" ry="18"/>
      <ellipse cx="95" cy="68" rx="20" ry="14"/>
      <ellipse cx="320" cy="75" rx="25" ry="16"/>
      <ellipse cx="355" cy="88" rx="18" ry="12"/>
      <ellipse cx="340" cy="60" rx="15" ry="10"/>
    </g>
    <g opacity="0.13" fill="#2a3a20">
      <ellipse cx="30" cy="320" rx="22" ry="30"/>
      <ellipse cx="370" cy="280" rx="20" ry="28"/>
      <ellipse cx="50" cy="460" rx="25" ry="20"/>
      <ellipse cx="360" cy="440" rx="22" ry="18"/>
    </g>
    <path d="M 45 100 Q 52 180 48 260 Q 44 340 50 420 Q 54 480 58 533"
      stroke="#8aA4b0" stroke-width="2.5" fill="none" opacity="0.35" filter="url(#roughen)"/>
    <path d="M 200 533 Q 198 450 200 380 Q 202 310 200 240 Q 198 180 200 120 Q 200 90 200 60"
      stroke="#8a7055" stroke-width="4" fill="none" opacity="0.5" filter="url(#roughen)"/>
    <path d="M 200 533 Q 198 450 200 380 Q 202 310 200 240 Q 198 180 200 120 Q 200 90 200 60"
      stroke="#b09070" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M 200 310 Q 240 305 280 308 Q 320 310 360 300"
      stroke="#8a7055" stroke-width="2.5" fill="none" opacity="0.4" filter="url(#roughen)"/>
    <path d="M 200 380 Q 165 378 130 382 Q 100 386 75 375"
      stroke="#8a7055" stroke-width="2.5" fill="none" opacity="0.35" filter="url(#roughen)"/>
    <g fill="none" stroke="#5a4030" stroke-width="0.8" opacity="0.25">
      <rect x="155" y="390" width="8" height="7" rx="0.5"/>
      <rect x="170" y="395" width="6" height="6" rx="0.5"/>
      <rect x="220" y="385" width="7" height="8" rx="0.5"/>
      <rect x="185" y="275" width="8" height="7" rx="0.5"/>
      <rect x="210" y="278" width="6" height="6" rx="0.5"/>
    </g>
  </svg>

  <div class="fog-layer">
    <div class="fog-patch" style="width:200px;height:120px;top:10%;left:15%;animation-duration:18s;animation-delay:-3s;"></div>
    <div class="fog-patch" style="width:160px;height:100px;top:35%;right:10%;animation-duration:22s;animation-delay:-8s;"></div>
    <div class="fog-patch" style="width:220px;height:130px;top:60%;left:5%;animation-duration:25s;animation-delay:-12s;"></div>
    <div class="fog-patch" style="width:180px;height:110px;bottom:15%;right:15%;animation-duration:20s;animation-delay:-5s;"></div>
  </div>

  <!-- Locais — começam bloqueados exceto a Plataforma -->
  <div class="location current-location" style="left:50%;top:91%" data-id="plataforma" data-name="Plataforma" data-status="ponto de chegada">
    <div class="pin-dot"></div>
    <div class="pin-label">Plataforma</div>
  </div>

  <div class="location locked" style="left:50%;top:72%" data-id="rua-principal" data-name="Rua Principal" data-status="inexplorado">
    <div class="pin-dot"></div>
    <div class="pin-label">Rua Principal</div>
  </div>

  <div class="location locked" style="left:62%;top:65%" data-id="farmacia" data-name="Farmácia Häkinen" data-status="inexplorado">
    <div class="pin-dot"></div>
    <div class="pin-label">Farmácia Häkinen</div>
  </div>

  <div class="location locked" style="left:38%;top:56%" data-id="igrejinha" data-name="A Igrejinha" data-status="inexplorado">
    <div class="pin-dot"></div>
    <div class="pin-label">A Igrejinha</div>
  </div>

  <div class="location locked" style="left:50%;top:47%" data-id="cruzamento" data-name="O Cruzamento" data-status="inexplorado">
    <div class="pin-dot"></div>
    <div class="pin-label">O Cruzamento</div>
  </div>

  <div class="location locked" style="left:50%;top:22%" data-id="norte" data-name="Norte" data-status="inexplorado">
    <div class="pin-dot"></div>
    <div class="pin-label">Norte</div>
  </div>

  <svg class="compass" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="27" fill="none" stroke="#5a4030" stroke-width="1.5" opacity="0.6"/>
    <polygon points="30,6 33,30 30,26 27,30" fill="#6b3a2a" opacity="0.9"/>
    <polygon points="30,54 27,30 30,34 33,30" fill="#5a4030" opacity="0.5"/>
    <text x="30" y="4" text-anchor="middle" font-family="IM Fell English,serif" font-size="7" fill="#5a4030" opacity="0.7">N</text>
  </svg>

  <div class="location-panel" id="panel">
    <button class="panel-close" id="panelClose">✕</button>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-status" id="panelStatus"></div>
  </div>

</div>
</div>

<script>
  const locations = document.querySelectorAll('.location');
  const panel = document.getElementById('panel');
  const panelName = document.getElementById('panelName');
  const panelStatus = document.getElementById('panelStatus');
  const panelClose = document.getElementById('panelClose');
  const connDot = document.getElementById('connDot');

  const statusLabels = {
    'ponto de chegada': 'você está aqui',
    'inexplorado': 'inexplorado',
    'visitado': 'visitado'
  };

  // Indicador de conexão Firebase
  window.addEventListener('online',  () => connDot.classList.add('online'));
  window.addEventListener('offline', () => { connDot.classList.remove('online'); connDot.classList.add('offline'); });
  setTimeout(() => connDot.classList.add('online'), 1500);

  locations.forEach(loc => {
    loc.addEventListener('click', (e) => {
      if (loc.classList.contains('locked')) return;
      e.stopPropagation();
      panelName.textContent = loc.dataset.name;
      panelStatus.textContent = statusLabels[loc.dataset.status] || loc.dataset.status;
      panel.classList.add('visible');
    });
  });

  panelClose.addEventListener('click', () => panel.classList.remove('visible'));
  document.addEventListener('click', () => panel.classList.remove('visible'));
  panel.addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
