<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa de Ingrid</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBCYLeM-kzt-ranLjPpJKerO1K-nF0U7_0",
  authDomain: "viksdal-rpg.firebaseapp.com",
  databaseURL: "https://viksdal-rpg-default-rtdb.firebaseio.com",
  projectId: "viksdal-rpg",
  storageBucket: "viksdal-rpg.firebasestorage.app",
  messagingSenderId: "259939315702",
  appId: "1:259939315702:web:b599846c0fb7ac48c6e1d7"
};
  const db = getDatabase(initializeApp(firebaseConfig));

  onValue(ref(db,'casa/rooms'), snap => {
    const data = snap.val(); if (!data) return;
    Object.entries(data).forEach(([id, s]) => {
      const g = document.getElementById(id); if (!g) return;
      s.unlocked ? g.classList.remove('dark') : g.classList.add('dark');
      s.danger   ? g.classList.add('danger')  : g.classList.remove('danger');
      g.dataset.note  = s.note  || '';
      g.dataset.items = s.items || 0;
    });
  });

  onValue(ref(db,'casa/position'), snap => {
    const pos = snap.val();
    document.querySelectorAll('.pos-dot').forEach(d => d.remove());
    if (!pos) return;
    const t = document.getElementById(pos); if (!t) return;
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('r','5'); c.setAttribute('fill','#c03a22');
    c.setAttribute('cx', t.dataset.cx); c.setAttribute('cy', t.dataset.cy);
    c.setAttribute('class','pos-dot');
    c.style.filter = 'drop-shadow(0 0 7px #c03a22)';
    document.getElementById('svg').appendChild(c);
  });
</script>
<style>
  :root { --bg:#0e0c09; --red:#8a2a1a; --rbright:#c03a22; --line:#c8a87a; --dim:rgba(200,168,122,.45); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Caveat',cursive; padding:20px; }
  h1   { font-size:clamp(17px,2.8vw,24px); color:var(--dim); letter-spacing:.2em; margin-bottom:4px; text-align:center; }
  .sub { font-size:clamp(10px,1.6vw,13px); color:rgba(138,42,26,.5); letter-spacing:.15em; margin-bottom:22px; font-style:italic; }
  .wrap { width:min(94vw,620px); }
  svg  { width:100%; height:auto; display:block; filter:drop-shadow(0 0 28px rgba(0,0,0,.9)); }

  @keyframes wallShake { 0%,100%{filter:url(#soft)} 50%{filter:url(#ra)} }
  @keyframes dangerPulse { 0%,100%{stroke-opacity:1} 50%{stroke-opacity:.25} }
  @keyframes posPulse { 0%,100%{r:5;opacity:1} 50%{r:7.5;opacity:.6} }

  .room-border { fill:none; stroke:var(--line); stroke-width:1.4; transition:stroke .3s; animation:wallShake 4s ease-in-out infinite; }
  .room-fill   { opacity:0; transition:opacity .3s; fill:var(--rbright); }
  .room-label,.furniture,.chaos { transition:opacity .3s; }

  .dark .room-fill   { opacity:1 !important; fill:#080604 !important; }
  .dark .room-border { stroke:rgba(200,168,122,.1) !important; animation:none !important; }
  .dark .room-label,.dark .furniture,.dark .chaos { opacity:0 !important; }
  .dark { pointer-events:none; }

  .danger .room-border { stroke:var(--rbright) !important; stroke-width:2 !important; animation:dangerPulse 1s ease-in-out infinite !important; }

  .room-hit { cursor:pointer; }
  .room-hit:not(.dark):hover .room-fill { opacity:.13; }
  .room-hit.active .room-fill { opacity:.2; }
  .room-hit.active:not(.danger) .room-border { stroke:var(--rbright); stroke-width:1.8; }

  .pos-dot { animation:posPulse 1.5s ease-in-out infinite; }

  .panel { margin-top:14px; width:min(94vw,620px); min-height:52px; border:1px solid rgba(200,168,122,.12); border-left:2px solid var(--red); padding:13px 17px; background:rgba(18,13,7,.97); opacity:0; transform:translateY(5px); transition:all .35s; }
  .panel.visible { opacity:1; transform:translateY(0); }
  .pname  { font-size:clamp(14px,2.2vw,18px); color:var(--line); letter-spacing:.1em; margin-bottom:4px; }
  .pnote  { font-size:clamp(11px,1.7vw,13px); color:rgba(200,168,122,.5); font-style:italic; }
  .pitems { font-size:clamp(10px,1.5vw,12px); color:rgba(138,42,26,.6); margin-top:3px; }
</style>
</head>
<body>
<h1>CASA DE INGRID</h1>
<div class="sub">viksdal · planta baixa</div>
<div class="wrap">
<svg id="svg" viewBox="0 0 480 580" xmlns="http://www.w3.org/2000/svg">

    <filter id="rough"><feTurbulence type="turbulence" baseFrequency=".035" numOctaves="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.6" xChannelSelector="R" yChannelSelector="G"/></filter>
    <filter id="soft"><feTurbulence type="turbulence" baseFrequency=".025" numOctaves="3" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale=".8" xChannelSelector="R" yChannelSelector="G"/></filter>
    <filter id="ra"><feTurbulence type="turbulence" baseFrequency=".04" numOctaves="4" result="n" seed="2"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/></filter>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="rgba(200,168,122,.35)"/></marker>
  </defs>

  <ellipse cx="100" cy="160" rx="70" ry="45" fill="rgba(90,50,15,.07)"/>
  <ellipse cx="360" cy="400" rx="55" ry="65" fill="rgba(70,35,10,.06)"/>
  <ellipse cx="240" cy="310" rx="90" ry="35" fill="rgba(138,42,26,.03)"/>

  <text x="28" y="34" font-family="Caveat,cursive" font-size="12" fill="rgba(200,168,122,.3)" letter-spacing="3">TÉRREO</text>
  <line x1="28" y1="38" x2="180" y2="38" stroke="rgba(200,168,122,.18)" stroke-width=".7"/>

  <!-- SALA -->
  <g class="room-hit dark" id="sala" data-cx="164" data-cy="148" onclick="pick(this,'Sala de Estar')">
    <rect class="room-fill" x="28" y="48" width="272" height="200"/>
    <path class="room-border" d="M 29,50 L 298,48 L 300,246 L 28,248 Z"/>
    <line x1="100" y1="248" x2="148" y2="248" stroke="#100d08" stroke-width="3.5"/>
    <path d="M 148,248 Q 148,228 128,228" stroke="rgba(200,168,122,.42)" stroke-width="1" fill="none"/>
    <text x="124" y="264" font-family="Caveat,cursive" font-size="9" fill="rgba(200,168,122,.3)" text-anchor="middle" letter-spacing="1">entrada</text>
    <line x1="300" y1="128" x2="300" y2="168" stroke="#100d08" stroke-width="3.5"/>
    <path d="M 300,168 Q 280,168 280,148" stroke="rgba(200,168,122,.38)" stroke-width="1" fill="none"/>
    <g class="furniture">
      <rect x="45" y="188" width="92" height="30" rx="2" fill="none" stroke="rgba(200,168,122,.1)" stroke-width=".8"/>

      <line x1="230" y1="170" x2="248" y2="162" stroke="rgba(138,42,26,.25)" stroke-width=".8"/>
      <circle cx="195" cy="130" r="2" fill="rgba(138,42,26,.22)"/>
    </g>
    <text class="room-label" x="164" y="108" font-family="Caveat,cursive" font-size="13" fill="rgba(200,168,122,.5)" text-anchor="middle" letter-spacing="2">SALA</text>
  </g>

  <!-- COZINHA -->
  <g class="room-hit dark" id="cozinha" data-cx="376" data-cy="148" onclick="pick(this,'Cozinha')">
    <rect class="room-fill" x="300" y="48" width="152" height="200"/>
    <path class="room-border" d="M 302,48 L 450,50 L 452,246 L 300,248 Z"/>
    <line x1="362" y1="248" x2="402" y2="248" stroke="#100d08" stroke-width="3.5"/>
    <path d="M 362,248 Q 362,228 382,228" stroke="rgba(200,168,122,.35)" stroke-width="1" fill="none"/>
    <g class="furniture">
      <rect x="310" y="58" width="130" height="18" rx="1" fill="none" stroke="rgba(200,168,122,.1)" stroke-width=".8"/>
      <rect x="318" y="155" width="55" height="42" rx="1" fill="none" stroke="rgba(200,168,122,.09)" stroke-width=".7"/>
    </g>
    <g class="chaos">
      <line x1="315" y1="110" x2="335" y2="118" stroke="rgba(138,42,26,.3)" stroke-width=".9"/>
      <circle cx="420" cy="130" r="1.8" fill="rgba(138,42,26,.2)"/>
    </g>
    <text class="room-label" x="376" y="145" font-family="Caveat,cursive" font-size="12" fill="rgba(200,168,122,.5)" text-anchor="middle" letter-spacing="2">COZINHA</text>
  </g>

  <path d="M 22,44 L 456,44 L 458,252 L 22,252 Z" fill="none" stroke="rgba(200,168,122,.38)" stroke-width="2" filter="url(#rough)"/>

  <!-- ESCADA -->
  <g opacity=".36">
    <rect x="28" y="260" width="56" height="70" fill="rgba(200,168,122,.03)" stroke="rgba(200,168,122,.25)" stroke-width=".8"/>
    <line x1="28" y1="274" x2="84" y2="274" stroke="rgba(200,168,122,.3)" stroke-width=".7"/>
    <line x1="28" y1="288" x2="84" y2="288" stroke="rgba(200,168,122,.3)" stroke-width=".7"/>
    <line x1="28" y1="302" x2="84" y2="302" stroke="rgba(200,168,122,.3)" stroke-width=".7"/>
    <line x1="28" y1="316" x2="84" y2="316" stroke="rgba(200,168,122,.3)" stroke-width=".7"/>
    <text x="56" y="342" font-family="Caveat,cursive" font-size="9" fill="rgba(200,168,122,.25)" text-anchor="middle" letter-spacing="1">escada</text>
    <line x1="56" y1="348" x2="56" y2="364" stroke="rgba(200,168,122,.2)" stroke-width="1" marker-end="url(#arr)"/>
  </g>

  <line x1="18" y1="375" x2="462" y2="375" stroke="rgba(200,168,122,.1)" stroke-width=".8" stroke-dasharray="5,7"/>
  <text x="28" y="394" font-family="Caveat,cursive" font-size="12" fill="rgba(200,168,122,.3)" letter-spacing="3">SEGUNDO ANDAR</text>
  <line x1="28" y1="398" x2="240" y2="398" stroke="rgba(200,168,122,.18)" stroke-width=".7"/>

  <path d="M 28,408 L 456,408 L 456,432 L 28,432 Z" fill="rgba(200,168,122,.02)" stroke="rgba(200,168,122,.2)" stroke-width=".8"/>
  <text x="240" y="424" font-family="Caveat,cursive" font-size="9" fill="rgba(200,168,122,.2)" text-anchor="middle" letter-spacing="3">corredor</text>

  <!-- QTO INGRID -->

    <path class="room-border" d="M 30,432 L 206,432 L 208,560 L 28,562 Z"/>
    <line x1="88" y1="432" x2="126" y2="432" stroke="#100d08" stroke-width="3.5"/>
    <path d="M 126,432 Q 126,414 108,414" stroke="rgba(200,168,122,.38)" stroke-width="1" fill="none"/>
    <g class="furniture">
      <rect x="40" y="444" width="110" height="62" rx="2" fill="none" stroke="rgba(200,168,122,.1)" stroke-width=".8"/>
      <rect x="40" y="444" width="110" height="16" rx="1" fill="none" stroke="rgba(200,168,122,.07)" stroke-width=".6"/>
      <rect x="156" y="444" width="22" height="22" rx="1" fill="none" stroke="rgba(200,168,122,.09)" stroke-width=".7"/>
    </g>
    <g class="chaos">
      <line x1="45" y1="525" x2="75" y2="518" stroke="rgba(138,42,26,.38)" stroke-width="1"/>
      <line x1="120" y1="535" x2="145" y2="526" stroke="rgba(138,42,26,.3)" stroke-width=".9"/>
      <line x1="32" y1="480" x2="37" y2="495" stroke="rgba(138,42,26,.22)" stroke-width=".6"/>
      <line x1="38" y1="478" x2="43" y2="493" stroke="rgba(138,42,26,.18)" stroke-width=".6"/>
    </g>
    <text class="room-label" x="118" y="510" font-family="Caveat,cursive" font-size="11" fill="rgba(200,168,122,.48)" text-anchor="middle" letter-spacing="1">QTO. INGRID</text>
  </g>

  <!-- QTO MANNON -->
  <g class="room-hit dark" id="quarto-mannon" data-cx="291" data-cy="497" onclick="pick(this,'Quarto de Mannon')">
    <rect class="room-fill" x="208" y="432" width="155" height="130"/>
    <path class="room-border" d="M 210,432 L 362,432 L 364,560 L 208,562 Z"/>
    <line x1="255" y1="432" x2="290" y2="432" stroke="#100d08" stroke-width="3.5"/>

      <rect x="220" y="442" width="80" height="55" rx="2" fill="none" stroke="rgba(200,168,122,.1)" stroke-width=".8"/>
      <rect x="220" y="518" width="48" height="26" rx="1" fill="none" stroke="rgba(200,168,122,.09)" stroke-width=".7"/>

      <line x1="295" y1="495" x2="312" y2="502" stroke="rgba(138,42,26,.2)" stroke-width=".8"/>

  <path d="M 22,405 L 460,405 L 462,565 L 22,565 Z" fill="none" stroke="rgba(200,168,122,.38)" stroke-width="2" filter="url(#rough)"/>
  <text x="400" y="285" font-family="Caveat,cursive" font-size="9" fill="rgba(138,42,26,.18)" transform="rotate(-6,400,285)">por que</text>

  <text x="310" y="358" font-family="Caveat,cursive" font-size="8" fill="rgba(138,42,26,.1)"  transform="rotate(3,310,358)">onde está?</text>
  <g opacity=".28" transform="translate(440,62)">
    <circle cx="0" cy="0" r="13" fill="none" stroke="rgba(200,168,122,.5)" stroke-width=".8"/>
    <polygon points="0,-9 2,2 0,0 -2,2" fill="rgba(200,168,122,.7)"/>
    <polygon points="0,9 2,-2 0,0 -2,-2" fill="rgba(200,168,122,.3)"/>
    <text x="0" y="-15" font-family="Caveat,cursive" font-size="9" fill="rgba(200,168,122,.4)" text-anchor="middle">N</text>
  </g>
</svg>
</div>

<div class="panel" id="panel">
  <div class="pname"  id="pName"></div>
  <div class="pnote"  id="pNote"></div>
  <div class="pitems" id="pItems"></div>
</div>

<script>
  let active = null;
  function pick(el, name) {
    if (el.classList.contains('dark')) return;
    if (active === el.id) {
      el.classList.remove('active'); active = null;
      document.getElementById('panel').classList.remove('visible'); return;
    }
    if (active) document.getElementById(active)?.classList.remove('active');
    el.classList.add('active'); active = el.id;
    const note  = el.dataset.note  || '';
    const items = parseInt(el.dataset.items) || 0;
    document.getElementById('pName').textContent  = name;
    document.getElementById('pNote').textContent  = note ? '📝 ' + note : '';
    document.getElementById('pItems').textContent = items > 0 ? `itens encontrados: ${items}` : '';
    document.getElementById('panel').classList.add('visible');
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.room-hit') && !e.target.closest('.panel')) {
      if (active) document.getElementById(active)?.classList.remove('active');
      active = null;
      document.getElementById('panel').classList.remove('visible');
    }
  });
</script>
</body>
</html>
